name: Review App Help Command

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to post help on
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  help:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(fromJson('["+review-app-help","+review-app-help\n","+review-app-help\r\n","/help","/help\n","/help\r\n"]'), github.event.comment.body) &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post help message
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const issueNumber = context.eventName === "workflow_dispatch"
              ? Number("${{ github.event.inputs.pr_number }}")
              : context.issue.number;
            const body = fs.readFileSync(".github/cpflow-help.md", "utf8");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
