# Keys beginning with "cpln_" correspond to your settings in Control Plane.
#
# This demo runs Rails plus the React on Rails Pro renderer on Control Plane.
# Staging and review apps use the shared staging Postgres GVC with app-specific
# logical databases instead of per-app Postgres workloads.

allow_org_override_by_env: true
allow_app_override_by_env: true

aliases:
  common: &common
    cpln_org: shakacode-open-source-examples-staging
    default_location: aws-us-east-2
    setup_app_templates:
      - app
      - rails
      - worker
      - renderer

    # Create the app identity and app secret policy so workloads can reveal
    # cpln://secret references from GVC env.
    skip_secrets_setup: false

    one_off_workload: rails
    app_workloads:
      - rails
      - worker
      - renderer
    additional_workloads: []

    maintenance_workload: maintenance
    release_script: release_script.sh

    stale_app_image_deployed_days: 5
    image_retention_days: 7

  production: &production
    <<: *common
    allow_org_override_by_env: false
    allow_app_override_by_env: false
    cpln_org: shakacode-open-source-examples-production
    upstream: react-on-rails-hn-rsc-demo-staging

apps:
  react-on-rails-hn-rsc-demo-staging:
    <<: *common

  react-on-rails-hn-rsc-demo-review-pr:
    <<: *common
    match_if_app_name_starts_with: true
    # Keep setup-app image-free for the first review-app deploy. Database setup
    # runs from release_script.sh after GitHub Actions builds the Docker image.

  react-on-rails-hn-rsc-demo-production:
    <<: *production
