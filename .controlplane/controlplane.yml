# Keys beginning with "cpln_" correspond to your settings in Control Plane.
#
# This demo uses the repository root Dockerfile and runs the Rails web process
# separately from the React on Rails Pro Node renderer. Production data is
# expected to live in an external Postgres cluster rather than a local workload.

allow_org_override_by_env: true
allow_app_override_by_env: true

aliases:
  common: &common
    cpln_org: my-org-staging
    default_location: aws-us-east-2

    setup_app_templates:
      - app
      - rails
      - renderer

    # Runtime secrets such as RAILS_MASTER_KEY and the Postgres URLs are
    # expected to be configured directly in Control Plane after app creation.
    skip_secrets_setup: true

    one_off_workload: rails
    app_workloads:
      - rails
      - renderer

    # Use the repo's real production Dockerfile rather than a second copy in
    # .controlplane/.
    dockerfile: ../Dockerfile

    # The generated review/staging/production workflows will run this when
    # present so database migrations happen before image cutover.
    release_script: release_script.sh

    stale_app_image_deployed_days: 5
    image_retention_days: 7

  production: &production
    <<: *common
    allow_org_override_by_env: false
    allow_app_override_by_env: false
    cpln_org: my-org-production
    upstream: react-on-rails-hn-rsc-demo-staging

apps:
  react-on-rails-hn-rsc-demo-staging:
    <<: *common

  react-on-rails-hn-rsc-demo-review:
    <<: *common
    match_if_app_name_starts_with: true

  react-on-rails-hn-rsc-demo-production:
    <<: *production
