# Template setup of the GVC, roughly corresponding to a Heroku app.
# Production must provide this dictionary secret from its managed/shared
# database provider before the app is deployed.
kind: gvc
name: "{{APP_NAME}}"
spec:
  env:
    - name: DATABASE_URL
      value: "cpln://secret/{{APP_NAME}}-database.DATABASE_URL"
    - name: CACHE_DATABASE_URL
      value: "cpln://secret/{{APP_NAME}}-database.CACHE_DATABASE_URL"
    - name: QUEUE_DATABASE_URL
      value: "cpln://secret/{{APP_NAME}}-database.QUEUE_DATABASE_URL"
    - name: CABLE_DATABASE_URL
      value: "cpln://secret/{{APP_NAME}}-database.CABLE_DATABASE_URL"
    - name: RAILS_ENV
      value: production
    - name: NODE_ENV
      value: production
    - name: RAILS_LOG_TO_STDOUT
      value: "true"
    - name: RAILS_SERVE_STATIC_FILES
      value: "true"
    # Review apps run pull request code. Values mounted through cpln://secret
    # become readable by that code after the workload starts, so app and
    # database secret dictionaries must contain review-safe values.
    - name: SECRET_KEY_BASE
      value: "cpln://secret/{{APP_SECRETS}}.SECRET_KEY_BASE"
    - name: REACT_RENDERER_URL
      value: 'http://renderer.{{APP_NAME}}.cpln.local:3800'
    - name: RENDERER_PORT
      value: "3800"
    - name: RENDERER_LOG_LEVEL
      value: info
    - name: RENDERER_WORKERS_COUNT
      value: "2"
    - name: RENDERER_PASSWORD
      value: "cpln://secret/{{APP_SECRETS}}.RENDERER_PASSWORD"
    - name: REACT_ON_RAILS_PRO_LICENSE
      value: "cpln://secret/{{APP_SECRETS}}.REACT_ON_RAILS_PRO_LICENSE"
  staticPlacement:
    locationLinks:
      - "{{APP_LOCATION_LINK}}"
