kind: gvc
name: {{APP_NAME}}
spec:
  env:
    - name: RAILS_ENV
      value: production
    - name: RAILS_LOG_LEVEL
      value: info
    - name: RAILS_SERVE_STATIC_FILES
      value: "true"
    - name: REACT_RENDERER_URL
      value: http://renderer.{{APP_NAME}}.cpln.local:3800
    - name: RENDERER_HOST
      value: "0.0.0.0"
    - name: RENDERER_PORT
      value: "3800"
    - name: RENDERER_SERVER_BUNDLE_CACHE_PATH
      value: /rails/tmp/.node-renderer-bundles
    - name: SOLID_QUEUE_IN_PUMA
      value: "true"
    # Required runtime secrets:
    # - name: RAILS_MASTER_KEY
    #   value: cpln://secret/react-on-rails-hn-rsc-demo-secrets/RAILS_MASTER_KEY
    # - name: DATABASE_URL
    #   value: cpln://secret/react-on-rails-hn-rsc-demo-secrets/DATABASE_URL
    # - name: CACHE_DATABASE_URL
    #   value: cpln://secret/react-on-rails-hn-rsc-demo-secrets/CACHE_DATABASE_URL
    # - name: QUEUE_DATABASE_URL
    #   value: cpln://secret/react-on-rails-hn-rsc-demo-secrets/QUEUE_DATABASE_URL
    # - name: CABLE_DATABASE_URL
    #   value: cpln://secret/react-on-rails-hn-rsc-demo-secrets/CABLE_DATABASE_URL
    #
    # Optional renderer secret:
    # - name: RENDERER_PASSWORD
    #   value: cpln://secret/react-on-rails-hn-rsc-demo-secrets/RENDERER_PASSWORD
  staticPlacement:
    locationLinks:
      - {{APP_LOCATION_LINK}}
